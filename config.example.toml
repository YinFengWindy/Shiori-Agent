# =============================================================================
# 必填：LLM 配置
# api_key 可以直接填字符串，也可以用 ${ENV_VAR} 引用环境变量。
# =============================================================================

[llm]
provider = "deepseek"

[llm.main]
# 主模型，必填。推荐 deepseek-v4-flash（agent 能力强、价格低）。
model = "deepseek-v4-flash"
api_key = "sk-..."
base_url = "https://api.deepseek.com/v1"
enable_thinking = true
multimodal = false

[llm.fast]
# 轻量模型，用于 memory gate / query rewrite / HyDE。
# 不填则退回主模型，但延迟会稍高。
model = "qwen-flash"
api_key = "sk-..."
base_url = "https://dashscope.aliyuncs.com/compatible-mode/v1"

[llm.vl]
# 视觉模型，仅在 llm.main.multimodal = false 时需要。
# model 留空则不启用，图片会作为路径传给主模型。
model = "qwen-vl-plus"
api_key = "sk-..."
base_url = "https://dashscope.aliyuncs.com/compatible-mode/v1"

# =============================================================================
# Agent 行为
# =============================================================================

[agent]
system_prompt = "You are Akashic, a helpful AI assistant with access to tools. Always respond in the same language the user uses."
max_tokens = 8192
# 设为 0 表示不限制迭代轮数；长任务仍可用 /stop 中断。
max_iterations = 40
dev_mode = false

[agent.context]
memory_window = 40

[agent.tools]
search_enabled = true

# 可选：长期记忆整理任务（默认已启用，通常无需修改）
# [agent.maintenance]
# memory_optimizer_enabled = true
# memory_optimizer_interval_seconds = 64800

# 可选：控制加载哪些工具集（默认值适合大多数场景）
# [agent.wiring]
# toolsets = ["meta_common", "spawn", "coding_agent", "schedule", "mcp"]

# 可选：由当前角色调度本机 Codex / Claude Code。默认关闭。
[coding_agents]
enabled = false
worktree_root = "D:/Coding/.shiori-worktrees"
default_project = ""
default_profile = "codex_default"
max_parallel_runs = 3

[coding_agents.profiles.codex_default]
provider = "codex"
model = "gpt-5.6"
effort = "high"
timeout_seconds = 3600
max_parallel_runs = 2
max_permission_level = "workspace-write"

[coding_agents.profiles.claude_default]
provider = "claude"
model = "sonnet"
effort = "high"
timeout_seconds = 3600
max_parallel_runs = 1
max_permission_level = "workspace-write"
max_budget_usd = 20

# [coding_agents.projects.shiori]
# repo_path = "D:/Coding/Shiori"
# base_ref = "HEAD"
# retention = "keep"
# max_parallel_runs = 2

# =============================================================================
# 必填：至少配置一个频道（Telegram、NapCat QQ 或官方 QQBot 选其一）
# token / bot_uin / app_id / client_secret 为空时该频道自动跳过，不会报错。
# =============================================================================

[channels.telegram]
# BotFather 给的 bot token，格式：123456789:AAF...
token = ""
# channel 标识符，决定 session key 前缀（如 telegram:12345）。
# 多个 bot 想要隔离记忆时，改成不同的名字（如 "telegram_work"）。
# channel_name = "telegram"

[channels.qq]
# 填 QQ 号启用 QQ 频道，留空跳过。
bot_uin = ""
websocket_open_timeout_seconds = 5.0

# 可选：QQ 开放平台官方机器人，使用官方 Gateway 和 REST API。
# [plugins.qqbot]
# app_id = ""
# client_secret = ""
# allow_from = []

# =============================================================================
# 语义记忆
# default memory 的检索阈值在 plugins/default_memory/config.local.toml。
# =============================================================================

[memory]
enabled = true
# 语义记忆 engine 选择。留空等同 default。
engine = ""

[memory.embedding]
model = "text-embedding-v3"
api_key = "sk-..."
base_url = "https://dashscope.aliyuncs.com/compatible-mode/v1"

[integrations.novelai]
enabled = false
token = "${NOVELAI_TOKEN}"
base_url = "https://image.novelai.net"
default_model = "nai-diffusion-4-5-curated"
nsfw_model = "nai-diffusion-4-5-full"
nsfw_enabled = false
allow_txt2img = true
allow_img2img = true
auto_writeback_role_assets = false
max_pixels = 1048576
max_steps = 28
default_samples = 1
